<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Tool | Simplify Your Workflow</title>
    <meta name="description" content="A premium Kanban board for visual task management and real-time collaboration." />
    <link rel="stylesheet" href="/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <header class="navbar">
        <div class="logo">
          <i data-lucide="layout-dashboard"></i>
          <h1 id="board-title-display">KanbanBoard</h1>
        </div>
        <div class="board-switcher">
          <label class="sr-only" for="board-select">Select board</label>
          <select id="board-select" class="select"></select>
          <button id="board-settings" class="btn btn-secondary" type="button" title="Board settings">
            <i data-lucide="more-horizontal"></i>
            Board
          </button>
        </div>
        <div class="navbar-actions">
          <button id="add-board" class="btn btn-primary">
            <i data-lucide="plus"></i>
            New Board
          </button>
        </div>
      </header>

      <main class="main">
        <section class="toolbar" aria-label="Task filters">
          <div class="toolbar-group grow">
            <label class="sr-only" for="filter-query">Search</label>
            <div class="input-icon">
              <i data-lucide="search"></i>
              <input id="filter-query" class="input" type="search" placeholder="Search tasks..." autocomplete="off" />
            </div>
          </div>
          <div class="toolbar-group">
            <label class="sr-only" for="filter-priority">Priority</label>
            <select id="filter-priority" class="select">
              <option value="">All priorities</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="toolbar-group">
            <label class="sr-only" for="filter-tag">Tag</label>
            <input id="filter-tag" class="input" type="text" placeholder="Tag…" autocomplete="off" />
          </div>
          <div class="toolbar-group">
            <label class="sr-only" for="filter-assignee">Assignee</label>
            <input id="filter-assignee" class="input" type="text" placeholder="Assignee…" autocomplete="off" />
          </div>
          <div class="toolbar-group">
            <button id="filter-clear" class="btn btn-ghost" type="button">Clear</button>
          </div>
        </section>

        <div id="board-container">
          <!-- Columns will be injected here -->
          <div class="empty-state">
            <p>Loading your board...</p>
          </div>
        </div>
      </main>

      <!-- Task Modal Shell -->
      <div id="modal-container" class="modal-overlay hidden">
        <div class="modal-content">
          <!-- Modal content will be injected here -->
        </div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
